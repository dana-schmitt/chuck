# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Forwards error-level+ Monolog records to Sentry as issues (no-ops if SENTRY_DSN is unset).
    # Only handles plain log messages, not exceptions - those are already captured once by
    # SentryBundle's own exception listener, so this avoids reporting the same exception twice.
    Sentry\Monolog\LogToSentryIssueHandler:
        arguments:
            $level: !php/const Monolog\Level::Error

    # AI_PROVIDER selects the provider implementation per config, not per code change - see
    # App\Ai\AiProviderFactory. "http" (default) talks to the ai-service container; "null" makes
    # every AI call throw immediately, exercised by every caller's fallback path (useful for local
    # dev without running ai-service at all).
    App\Ai\AiProviderFactory:
        arguments:
            $aiProvider: '%env(AI_PROVIDER)%'

    App\Ai\EmbeddingProviderInterface:
        factory: ['@App\Ai\AiProviderFactory', 'createEmbeddingProvider']

    App\Ai\CompletionProviderInterface:
        factory: ['@App\Ai\AiProviderFactory', 'createCompletionProvider']

when@test:
    services:
        # Functional tests assert on specific, freshly-fetched joke text; the "occasionally show
        # a popular joke instead" behavior is covered separately (and deterministically) by
        # JokeManagerTest, so keep it off here.
        App\Services\JokeManager:
            autowire: true
            arguments:
                $popularJokeChance: 0.0
