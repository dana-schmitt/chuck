# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    #csrf_protection: true

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    #esi: true
    #fragments: true

    http_client:
        scoped_clients:
            chuck_norris_jokes.client:
                base_uri: 'https://api.chucknorris.io'
            ai_service.client:
                base_uri: '%env(AI_SERVICE_URL)%'
                headers:
                    X-Internal-Secret: '%env(AI_SERVICE_SHARED_SECRET)%'
                timeout: 20

when@prod:
    framework:
        # The app runs behind a reverse proxy (see compose.prod.yaml) which terminates TLS and
        # forwards X-Forwarded-* headers. Trust only that proxy so client-supplied headers can't
        # be used to spoof the client IP or scheme.
        trusted_proxies: '%env(default::TRUSTED_PROXIES)%'
        trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port']

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
