framework:
    rate_limiter:
        like_action:
            policy: 'sliding_window'
            limit: 30
            interval: '1 minute'
        comment_action:
            policy: 'sliding_window'
            limit: 10
            interval: '1 minute'
        reaction_action:
            policy: 'sliding_window'
            limit: 30
            interval: '1 minute'
        explain_action:
            # Lower than like/reaction: each request can hit the LLM (only the first per
            # joke+locale actually does, but the limiter can't know that in advance).
            policy: 'sliding_window'
            limit: 10
            interval: '1 minute'
        api_search_action:
            # GET /api/jokes/search runs semantic search (embedding + optional rerank), unlike
            # the rest of the read-only JSON API which is plain DB reads - keyed per API token/
            # user rather than IP, same as the other AI-backed limiters.
            policy: 'sliding_window'
            limit: 20
            interval: '1 minute'
