security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    role_hierarchy:
        ROLE_ADMIN: ROLE_USER
        # API tokens (ApiClientUser, e.g. the MCP server) get exactly the same access_control
        # treatment as a logged-in browser user - nothing more. There is no ROLE_API-specific
        # access_control rule anywhere; the read-only JSON API is the only thing that role can
        # reach in practice, since access_control only grants ROLE_USER-gated paths.
        ROLE_API: ROLE_USER
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
        # ApiClientUser isn't loaded through this one (ApiTokenAuthenticator supplies its own
        # loader), but Symfony's ContextListener still needs a provider that supportsClass() it
        # in order to persist an authenticated API-token request into the session at all.
        api_client_user_provider:
            id: App\Security\ApiClientUserProvider
        main_provider:
            chain:
                providers: [app_user_provider, api_client_user_provider]
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: main_provider
            # Two authenticators on one firewall means Symfony can no longer infer which one
            # is the entry point (what handles an anonymous request to a protected route) -
            # LoginFormAuthenticator (redirect to /login) stays that entry point; the API
            # token authenticator only ever activates for requests that already carry a
            # Bearer header (see ApiTokenAuthenticator::supports()), so this doesn't change
            # anonymous browser behavior at all.
            entry_point: App\Security\LoginFormAuthenticator
            custom_authenticators:
                - App\Security\LoginFormAuthenticator
                - App\Security\ApiTokenAuthenticator
            logout:
                path: app_logout
                # where to redirect after logout
                target: app_login

            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/joke, roles: ROLE_USER }
        - { path: ^/liked, roles: ROLE_USER }
        - { path: ^/top, roles: ROLE_USER }
        - { path: ^/search, roles: ROLE_USER }
        - { path: ^/api, roles: ROLE_USER }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/profile, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
