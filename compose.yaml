name: chuckify-dev

services:
###> doctrine/doctrine-bundle ###
  database:
    image: mysql:8.0
    #command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_DATABASE: 'joke'
      MYSQL_USER: chuck
      MYSQL_PASSWORD: norris
      MYSQL_ROOT_PASSWORD: chuckme
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-pchuckme']
      interval: 5s
      timeout: 5s
      retries: 10
    #ports:
    #  - '3306:3306'
    #expose:
    #  - 3306
    #volumes:
    #  - database_data:/var/lib/mysql
###< doctrine/doctrine-bundle ###

  ai-service:
    build:
      context: ./ai-service
    restart: always
    environment:
      AI_PROVIDER: fake
      SHARED_SECRET: dev-only-shared-secret-change-me
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
    driver: local
###< doctrine/doctrine-bundle ###
